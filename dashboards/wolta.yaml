# Wolta – example dashboard
#
# TWO ways to use this file:
#   A) The WHOLE file as its own dashboard: Settings → Dashboards → Add
#      dashboard → open it → three-dot menu → Edit in raw mode → paste ALL of it.
#   B) JUST ONE card on an existing view: copy only the "vertical-stack" block
#      below (from "type: vertical-stack") into a Manual card. Pasting the whole
#      file (title:/views:) into a card gives the error "No card type configured".
#
# Entity IDs below are HA's default slugs of the ENGLISH sensor names (names are
# translated and IDs are generated from your HA instance language at install
# time). On a Swedish-language instance, swap in the Swedish slugs (see README →
# Verify entity IDs for the mapping table), and always check your Wolta device
# page (Settings → Devices & Services → Wolta) if anything differs.
#
# Sensors show "unavailable"/"unknown" until the first recompute completes
# (requires ≥30 days of data; IRR/payback/actual savings also require purchase
# price + date, configurable via the integration's Configure dialog).

title: Wolta Battery Analysis
views:
  - title: Wolta
    path: wolta
    cards:
      - type: vertical-stack
        cards:
          # ── Optimisation grade (gauge 0–100) ────────────────────────────
          - type: gauge
            entity: sensor.wolta_optimisation_grade
            name: Optimisation grade
            min: 0
            max: 100
            severity:
              green: 70
              yellow: 40
              red: 0
            needle: true

          # ── Economy sensors (horizontal row) ────────────────────────────
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.wolta_battery_value_per_year
                name: "Battery value/yr"
              - type: entity
                entity: sensor.wolta_actual_savings_this_year
                name: "Savings this year"

          # ── IRR and payback time ─────────────────────────────────────────
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.wolta_internal_rate_of_return_irr
                name: IRR
              - type: entity
                entity: sensor.wolta_payback_time
                name: "Payback time"

          # ── Status + data status ─────────────────────────────────────────
          - type: entities
            title: Status
            entities:
              - entity: sensor.wolta_status
                name: Status
              - entity: sensor.wolta_data_status
                name: Last data point

          # ── Recompute (button) ───────────────────────────────────────────
          - type: button
            entity: button.wolta_recompute
            name: "Recompute now"
            icon: mdi:calculator
            tap_action:
              action: toggle

          # ── Full results on wolta.se ─────────────────────────────────────
          # The link is resolved dynamically from the device's configuration_url
          # (v0.4.1+), so the card works without pasting your token manually.
          # Null-safe: device_id() returns None if the entity doesn't exist
          # (e.g. wrong language variant of this dashboard) – guard so the card
          # shows a hint instead of spamming the HA log with template errors.
          - type: markdown
            content: >-
              {% set d = device_id('sensor.wolta_optimisation_grade') %}

              {% if d %}[**Full results on wolta.se →**]({{ device_attr(d,
              'configuration_url') }})

              Grade breakdown, economy drill-downs and history for your profile.

              {% else %}Entity `sensor.wolta_optimisation_grade` not found – if
              your HA instance runs in Swedish, use `dashboards/wolta.sv.yaml`
              instead.{% endif %}
